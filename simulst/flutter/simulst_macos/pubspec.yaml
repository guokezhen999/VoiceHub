name: simulst_macos
description: Flutter FFI plugin bundling libsimulst.dylib for streaming speech translation.
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=2.8.1"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      macos:
        ffiPlugin: true
      ios:
        ffiPlugin: true
